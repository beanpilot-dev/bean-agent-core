tier: "tier_1"
name: "CLERK Behavior Check"
maximum_score: 35
scoring:
  points_per_case: 1
  evaluator: "deterministic_preview_evaluator"
intent: >
  Verify that Agent-Core can accurately produce a correct Beancount preview for complete, unambiguous, commonly recurring user requests.
cases:
  - id: "T1-01"
    fixture: "basic-us-v1"
    title: "Credit-card grocery purchase"
    user_prompt: "Record a $75.50 grocery purchase at Trader Joe's on 2026-06-23, paid with the primary credit card."
    reference_answer:
      expected_disposition: "preview"
      canonical_preview: |
        2026-06-23 * "Trader Joe's" "groceries"
          Expenses:Food:Groceries          75.50 USD
          Liabilities:CreditCard:Primary  -75.50 USD
    deterministic_assertions:
      entry_type: "transaction"
      date: "2026-06-23"
      posting_multiset:
        - { account: "Expenses:Food:Groceries", units: "75.50", currency: "USD" }
        - { account: "Liabilities:CreditCard:Primary", units: "-75.50", currency: "USD" }
      forbidden_account_prefixes:
        - "Income:"
        - "Equity:"

