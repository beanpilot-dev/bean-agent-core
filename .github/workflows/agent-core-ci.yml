name: Agent Core CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: beanpilot-dev-agent-core
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: beanpilot-dev
  IMAGE_NAME: beanpilot-agent-core
  DEPLOY_DIR: /opt/beanpilot/dev

jobs:
  build-push-deploy:
    name: Test, publish, and deploy agent-core to dev
    runs-on: [self-hosted, linux, x64, saas-dev]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Set image tags
        id: images
        run: |
          echo "agent_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "agent_image=${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version_image=${REGISTRY}/${IMAGE_NAMESPACE}/${IMAGE_NAME}:${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src

      - name: Test
        env:
          AGENT_MODE: cloud
        run: pytest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t "${{ steps.images.outputs.agent_image }}" .
          if [[ -n "${{ steps.images.outputs.version_image }}" ]]; then
            docker tag "${{ steps.images.outputs.agent_image }}" "${{ steps.images.outputs.version_image }}"
          fi

      - name: Push image
        run: |
          docker push "${{ steps.images.outputs.agent_image }}"
          if [[ -n "${{ steps.images.outputs.version_image }}" ]]; then
            docker push "${{ steps.images.outputs.version_image }}"
          fi

      - name: Deploy agent-core to dev
        if: github.ref_type == 'branch' && github.ref_name == 'main'
        run: |
          "${DEPLOY_DIR}/scripts/update-dev-component.sh" \
            agent \
            "${{ steps.images.outputs.agent_sha }}" \
            "${{ steps.images.outputs.agent_image }}"
